# Render Blueprint — AI Personal Wardrobe Platform
# Docs: https://render.com/docs/blueprint-spec
#
# Before deploy:
# 1. Push this repo to GitHub and connect it on Render.
# 2. Create a PostgreSQL database on Render (or use an existing one).
# 3. Create a Qdrant Cloud cluster and copy URL + API key.
# 4. Fill env vars marked sync: false in the Render dashboard after first sync.
# 5. After wardrobe-face deploys, set wardrobe-api → FACE_SERVICE_URL to
#    https://<wardrobe-face-host> (no trailing slash). Users who registered
#    while FACE_SERVICE_MOCK=true must re-register face after switching to real embeddings.
#
# Use Node runtime (not Docker) — simpler and fixes migration paths automatically.

services:
  - type: web
    name: wardrobe-api
    runtime: node
    region: singapore
    plan: free
    rootDir: wardrobe-ai/backend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wardrobe-database
          property: connectionString
      - key: POSTGRES_SSL
        value: "true"
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FACE_SERVICE_MOCK
        value: "false"
      - key: FACE_SERVICE_URL
        sync: false
      - key: FACE_LOGIN_SIMILARITY_THRESHOLD
        value: "0.55"
      - key: QDRANT_SIMILARITY_THRESHOLD
        value: "0.55"
      - key: ADMIN_EMAILS
        value: patel12@gmail.com,patel@gmail.com
      - key: CLOTHING_SERVICE_MOCK
        value: "true"
      - key: CORS_ORIGINS
        value: https://ai-personal-wardrobe-1.onrender.com,https://ai-personal-wardrobe.onrender.com
      - key: CORS_ALLOW_ONRENDER
        value: "true"

  - type: web
    name: wardrobe-web
    runtime: node
    region: singapore
    plan: free
    rootDir: wardrobe-ai/frontend
    buildCommand: npm ci --ignore-scripts && node scripts/copy-face-models.js && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_DIST_DIR
        value: .next
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://ai-personal-wardrobe.onrender.com/api
      - key: BACKEND_API_URL
        value: https://ai-personal-wardrobe.onrender.com/api

  - type: web
    name: wardrobe-face
    runtime: docker
    region: singapore
    plan: free
    rootDir: wardrobe-ai/ai-services/face-service
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health

databases:
  - name: wardrobe-database
    region: singapore
    plan: free
    databaseName: wardrobe_database
    user: wardrobe_database_user
