name: wardrobe-ai

services:
  postgres:
    image: postgres:16-alpine
    container_name: wardrobe-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - wardrobe-net

  redis:
    image: redis:7-alpine
    container_name: wardrobe-redis
    restart: unless-stopped
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wardrobe-net

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: wardrobe-qdrant
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '${QDRANT_PORT:-6333}:6333'
      - '${QDRANT_GRPC_PORT:-6334}:6334'
    volumes:
      - qdrant_data:/qdrant/storage
      - ./docker/qdrant/config.yaml:/qdrant/config/production.yaml:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://127.0.0.1:6333/readyz || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - wardrobe-net

  minio:
    image: minio/minio:latest
    container_name: wardrobe-minio
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - wardrobe-net

  minio-init:
    image: minio/mc:latest
    container_name: wardrobe-minio-init
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      mc alias set wardrobe http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing wardrobe/$${MINIO_BUCKET_WARDROBE};
      mc mb --ignore-existing wardrobe/$${MINIO_BUCKET_FACES};
      mc anonymous set none wardrobe/$${MINIO_BUCKET_WARDROBE};
      mc anonymous set none wardrobe/$${MINIO_BUCKET_FACES};
      echo 'MinIO buckets initialized';
      exit 0;
      "
    networks:
      - wardrobe-net

volumes:
  postgres_data:
    name: wardrobe-postgres-data
  redis_data:
    name: wardrobe-redis-data
  qdrant_data:
    name: wardrobe-qdrant-data
  minio_data:
    name: wardrobe-minio-data

networks:
  wardrobe-net:
    name: wardrobe-net
    driver: bridge
